services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reloop
      POSTGRES_USER: reloop
      POSTGRES_PASSWORD: reloop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reloop"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://reloop:reloop@db:5432/reloop
      JWT_SECRET: replace-this-secret
      DEVICE_API_KEY: demo-device-key
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:

