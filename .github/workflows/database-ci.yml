name: Database CI

on:
  pull_request:
  push:
    branches:
      - dev
      - main

jobs:
  database-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: reloop_app
          POSTGRES_PASSWORD: reloop_test_password
          POSTGRES_DB: reloop_hub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reloop_app -d reloop_hub_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://reloop_app:reloop_test_password@localhost:5432/reloop_hub_test
      TEST_DATABASE_URL: postgresql+psycopg://reloop_app:reloop_test_password@localhost:5432/reloop_hub_test
      JWT_SECRET: ci-only-secret-at-least-32-characters-long
      DEVICE_API_KEY: ci-device-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Apply migrations
        run: python -m alembic upgrade head

      - name: Run tests
        run: python -m pytest -q -p no:cacheprovider

      - name: Check schema drift
        run: python -m alembic check
